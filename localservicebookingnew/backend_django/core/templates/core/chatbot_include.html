{% load static %}
<!-- Chatbot Floating UI -->
<div id="chatbot-container">
    <button id="chatbot-toggle">
        <i class="fa-solid fa-comments"></i>
    </button>

    <div id="chatbot-window">
        <div id="chatbot-header">
            <span>Service Bot</span>
            <button id="chatbot-close" style="background:none; border:none; color:white; cursor:pointer; font-size:18px;">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>

        <div id="chatbot-messages">
            <!-- Messages will appear here -->
            <div id="typing-indicator" class="typing-indicator">Bot is typing...</div>
        </div>

        <div id="chatbot-input-area">
            <input type="text" id="chatbot-input" placeholder="Type your message...">
            <button id="chatbot-send">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<!-- Load Chatbot Static Files -->
<link rel="stylesheet" href="{% static 'core/css/chatbot.css' %}">
<script src="{% static 'core/js/chatbot.js' %}"></script>
